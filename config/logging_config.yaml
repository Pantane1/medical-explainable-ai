version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  brief:
    format: "[%(levelname)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: brief
    stream: ext://sys.stdout
    level: INFO

  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760    # 10 MB
    backupCount: 5
    level: DEBUG

  audit_file:
    class: logging.FileHandler
    formatter: standard
    filename: logs/audit_trail.log
    level: INFO

  error_file:
    class: logging.FileHandler
    formatter: standard
    filename: logs/errors.log
    level: ERROR

root:
  level: DEBUG
  handlers:
    - console
    - file
    - error_file

loggers:
  src.compliance.audit_logger:
    level: INFO
    handlers:
      - audit_file
    propagate: false
